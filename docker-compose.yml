version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # PostgreSQL Database with PostGIS for geospatial queries
  # ═══════════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # Redis for caching, sessions, rate limiting, and pub/sub
  # ═══════════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7.4.2-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # MinIO - S3-compatible object storage for media
  # ═══════════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: nexus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # MinIO Client - Creates bucket on startup
  # ═══════════════════════════════════════════════════════════════════════════════
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: nexus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set nexus http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb nexus/nexus-media --ignore-existing;
      exit 0;
      "
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # Nexus API Server (Development)
  # ═══════════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      CDN_URL: ${CDN_URL}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
      - /app/apps/api/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # Nexus Web App (Development)
  # ═══════════════════════════════════════════════════════════════════════════════
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: nexus-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    networks:
      - nexus-network

  # ═══════════════════════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy (Production simulation)
  # ═══════════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    networks:
      - nexus-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  nexus-network:
    driver: bridge
